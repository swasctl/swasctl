<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" width="700" height="320">
  <defs>
    <style>
      .bg { fill: #0D1117; }
      .grid { stroke: #21262D; stroke-width: 0.8; fill: none; }
      .axis { stroke: #30363D; stroke-width: 1; }
      .axis-label { fill: #8B949E; font-family: 'Courier New', monospace; font-size: 11px; text-anchor: middle; }
      .axis-sub { fill: #484F58; font-family: 'Courier New', monospace; font-size: 9px; text-anchor: middle; }
      .title { fill: #8B949E; font-family: 'Courier New', monospace; font-size: 11px; }
      .radar-fill { fill: #1F6FEB; fill-opacity: 0.15; stroke: #1F6FEB; stroke-width: 1.5; stroke-opacity: 0.8; }
      .dot { fill: #00D9FF; }
      .pct { fill: #8B949E; font-family: 'Courier New', monospace; font-size: 10px; }
      .skill-name { fill: #E6EDF3; font-family: 'Courier New', monospace; font-size: 10px; }
      .radar-path { animation: drawradar 1.5s 0.3s ease-out both; }
      @keyframes drawradar {
        from { opacity: 0; transform-origin: 185px 170px; transform: scale(0.1); }
        to   { opacity: 1; transform-origin: 185px 170px; transform: scale(1); }
      }
      .bar1  { animation: growbar 0.8s 0.4s  ease-out both; transform-origin: 450px center; }
      .bar2  { animation: growbar 0.8s 0.55s ease-out both; transform-origin: 450px center; }
      .bar3  { animation: growbar 0.8s 0.7s  ease-out both; transform-origin: 450px center; }
      .bar4  { animation: growbar 0.8s 0.85s ease-out both; transform-origin: 450px center; }
      .bar5  { animation: growbar 0.8s 1.0s  ease-out both; transform-origin: 450px center; }
      .bar6  { animation: growbar 0.8s 1.15s ease-out both; transform-origin: 450px center; }
      .bar7  { animation: growbar 0.8s 1.3s  ease-out both; transform-origin: 450px center; }
      .bar8  { animation: growbar 0.8s 1.45s ease-out both; transform-origin: 450px center; }
      .bar9  { animation: growbar 0.8s 1.6s  ease-out both; transform-origin: 450px center; }
      .bar10 { animation: growbar 0.8s 1.75s ease-out both; transform-origin: 450px center; }
      @keyframes growbar {
        from { transform: scaleX(0); opacity: 0; }
        to   { transform: scaleX(1); opacity: 1; }
      }
      .fadein { animation: fadein 0.5s 0.3s both; }
      @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
      .pulse { animation: pulse 2.5s infinite ease-in-out; }
      @keyframes pulse { 0%,100% { opacity: 0.4; r: 4; } 50% { opacity: 1; r: 5.5; } }
    </style>
  </defs>
  <rect width="700" height="320" rx="10" class="bg"/>
  <text x="20" y="24" class="title">[ Skill Matrix ]</text>
  <text x="530" y="24" class="title">— Python · C++ · TypeScript · Zeek</text>
  <g class="fadein">
