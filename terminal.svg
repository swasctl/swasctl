<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" width="700" height="340">
  <defs>
    <style>
      .bg { fill: #0D1117; }
      .titlebar { fill: #161B22; }
      .btn-r { fill: #FF5F57; }
      .btn-y { fill: #FEBC2E; }
      .btn-g { fill: #28C840; }
      .prompt { fill: #58A6FF; font-family: 'Courier New', monospace; font-size: 13px; }
      .cmd { fill: #E6EDF3; font-family: 'Courier New', monospace; font-size: 13px; }
      .out { fill: #3FB950; font-family: 'Courier New', monospace; font-size: 12px; }
      .out2 { fill: #F78166; font-family: 'Courier New', monospace; font-size: 12px; }
      .out3 { fill: #D2A8FF; font-family: 'Courier New', monospace; font-size: 12px; }
      .dim { fill: #8B949E; font-family: 'Courier New', monospace; font-size: 12px; }
      .cursor { fill: #58A6FF; }
      .line1 { animation: fadein 0.1s 0.5s both; }
      .line2 { animation: fadein 0.1s 2.0s both; }
      .line3 { animation: fadein 0.1s 2.3s both; }
      .line4 { animation: fadein 0.1s 2.6s both; }
      .line5 { animation: fadein 0.1s 3.2s both; }
      .line6 { animation: fadein 0.1s 4.5s both; }
      .line7 { animation: fadein 0.1s 4.8s both; }
      .line8 { animation: fadein 0.1s 5.1s both; }
      .line9 { animation: fadein 0.1s 6.5s both; }
      .line10 { animation: fadein 0.1s 7.8s both; }
      .type1 { animation: fadein 0.1s 0.3s both; }
      .type2 { animation: fadein 0.1s 1.8s both; }
      .type3 { animation: fadein 0.1s 4.3s both; }
      .type4 { animation: fadein 0.1s 6.3s both; }
      .cur1 { animation: blink 0.8s 0.3s 4 both, fadeout 0.1s 1.9s both; }
      .cur2 { animation: fadein 0.1s 1.8s both, blink 0.8s 1.8s 3 both, fadeout 0.1s 4.4s both; }
      .cur3 { animation: fadein 0.1s 4.3s both, blink 0.8s 4.3s 3 both, fadeout 0.1s 6.4s both; }
      .cur4 { animation: fadein 0.1s 6.3s both, blink 0.8s 6.3s 99 both; }
      @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
      @keyframes fadeout { from { opacity: 1; } to { opacity: 0; } }
      @keyframes blink { 0%,49%{ opacity:1 } 50%,100%{ opacity:0 } }
    </style>
  </defs>
  <rect width="700" height="340" rx="10" class="bg"/>
  <rect width="700" height="36" rx="10" class="titlebar"/>
  <rect y="26" width="700" height="10" class="titlebar"/>
  <circle cx="20" cy="18" r="6" class="btn-r"/>
  <circle cx="40" cy="18" r="6" class="btn-y"/>
  <circle cx="60" cy="18" r="6" class="btn-g"/>
  <text x="350" y="23" text-anchor="middle" class="dim" font-size="12">swasctl — bash</text>
  <g class="type1">
    <text x="20" y="68" class="prompt">swasctl@kali:~$</text>
    <text x="162" y="68" class="cmd"> sudo nmap -sV -p- 192.168.1.0/24</text>
  </g>
  <rect x="460" y="56" width="9" height="14" class="cursor cur1"/>
  <g class="line1"><text x="20" y="88" class="dim">Starting Nmap 7.94 ( https://nmap.org )</text></g>
  <g class="line2"><text x="20" y="104" class="out">Discovered open port </text><text x="168" y="104" class="out2">22/tcp</text><text x="213" y="104" class="out"> on 192.168.1.5</text></g>
  <g class="line3"><text x="20" y="120" class="out">Discovered open port </text><text x="168" y="120" class="out2">443/tcp</text><text x="220" y="120" class="out"> on 192.168.1.12</text></g>
  <g class="line4"><text x="20" y="136" class="out">Discovered open port </text><text x="168" y="136" class="out2">8080/tcp</text><text x="227" y="136" class="out"> on 192.168.1.20  </text><text x="360" y="136" class="dim">[ Apache httpd 2.4.54 ]</text></g>
  <g class="type2">
    <text x="20" y="160" class="prompt">swasctl@kali:~$</text>
    <text x="162" y="160" class="cmd"> zeek -i eth0 local.zeek</text>
  </g>
  <rect x="335" y="148" width="9" height="14" class="cursor cur2"/>
  <g class="line5"><text x="20" y="180" class="dim">listening on eth0, snaplen 65535</text></g>
  <g class="line6"><text x="20" y="196" class="out3">[NDR]</text><text x="62" y="196" class="out"> conn.log active — 847 flows captured</text></g>
  <g class="line7"><text x="20" y="212" class="out3">[NDR]</text><text x="62" y="212" class="out"> dns.log — suspicious query: </text><text x="268" y="212" class="out2">*.onion resolver</text></g>
  <g class="line8"><text x="20" y="228" class="out3">[NDR]</text><text x="62" y="228" class="out"> alert: beaconing pattern on 185.220.101.47:443</text></g>
  <g class="type3">
    <text x="20" y="252" class="prompt">swasctl@kali:~$</text>
    <text x="162" y="252" class="cmd"> python3 netintel.py --hunt --ioc 185.220.101.47</text>
  </g>
  <rect x="500" y="240" width="9" height="14" class="cursor cur3"/>
  <g class="line9"><text x="20" y="272" class="dim">[*] pulling threat intel feeds...</text></g>
  <g class="line10"><text x="20" y="288" class="out2">[!] IOC MATCH — </text><text x="143" y="288" class="out">Tor exit node · AbuseIPDB score: 97 · ThreatFox C2</text></g>
  <g class="type4">
    <text x="20" y="312" class="prompt">swasctl@kali:~$</text>
    <text x="162" y="312" class="cmd"> _</text>
  </g>
  <rect x="175" y="300" width="9" height="14" class="cursor cur4"/>
</svg>
